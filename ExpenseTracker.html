<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Expense Tracker | Personal Finance</title>
  <!-- Tailwind CSS + Font Awesome + Chart.js CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* Custom color overrides to match the exact scheme */
    body {
      background: #FAFAF9; /* stone-50 */
    }
    .card-transition {
      transition: all 0.2s ease-in-out;
    }
    .error-shake {
      animation: shake 0.2s ease-in-out 0s 2;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #E7E5E4; /* stone-200 */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #A8A29E; /* stone-400 */
      border-radius: 10px;
    }
    /* Custom utility for coral orange hover */
    .hover\:bg-orange-600:hover {
      background-color: #EA580C !important;
    }
    .bg-purple-700-custom {
      background-color: #7E22CE;
    }
    .hover\:bg-purple-800-custom:hover {
      background-color: #6B21A5;
    }
    .text-purple-700-custom {
      color: #7E22CE;
    }
    .border-purple-200-custom {
      border-color: #E9D5FF;
    }
    .from-purple-50-custom {
      --tw-gradient-from: #FAF5FF;
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10">
    <!-- Header with new purple theme -->
    <div class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold text-stone-800 inline-flex items-center gap-3">
        <i class="fas fa-wallet text-purple-700" style="color:#7E22CE"></i> 
        ExpenseTracker
      </h1>
      <p class="text-stone-500 mt-1 text-sm">Track, edit & visualize your spending</p>
    </div>

    <!-- Main grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- LEFT COLUMN -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Add / Edit Expense Card - white background with warm stone border -->
        <div class="bg-white rounded-2xl shadow-md p-5 border border-stone-200 card-transition">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold text-stone-800 flex items-center gap-2">
              <i class="fas fa-pen-alt" style="color:#7E22CE"></i> 
              <span id="form-title">Add New Expense</span>
            </h2>
            <button id="cancel-edit-btn" class="text-sm text-stone-400 hover:text-red-500 transition hidden">
              <i class="fas fa-times-circle"></i> Cancel
            </button>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Title *</label>
              <input type="text" id="title" placeholder="e.g., Groceries, Dinner" class="w-full border border-stone-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-purple-300 outline-none transition">
              <p id="title-error" class="text-red-600 text-xs mt-1 hidden"></p>
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Amount ($) *</label>
              <input type="number" id="amount" placeholder="0.00" step="0.01" class="w-full border border-stone-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-purple-300 outline-none">
              <p id="amount-error" class="text-red-600 text-xs mt-1 hidden"></p>
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Category *</label>
              <select id="category" class="w-full border border-stone-300 rounded-xl px-4 py-2 bg-white">
                <option value="Food">🍔 Food</option>
                <option value="Utilities">💡 Utilities</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Other">📌 Other</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Date *</label>
              <input type="date" id="date" class="w-full border border-stone-300 rounded-xl px-4 py-2">
              <p id="date-error" class="text-red-600 text-xs mt-1 hidden"></p>
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-stone-700 mb-1">Notes (optional)</label>
              <textarea id="notes" rows="2" placeholder="Any additional details..." class="w-full border border-stone-300 rounded-xl px-4 py-2 resize-none"></textarea>
            </div>
          </div>
          <div class="mt-5 flex gap-3">
            <button id="submit-expense-btn" class="bg-purple-700 hover:bg-purple-800 text-white font-semibold py-2 px-6 rounded-xl shadow-md transition flex items-center gap-2" style="background-color:#7E22CE">
              <i class="fas fa-save"></i> Add Expense
            </button>
          </div>
        </div>

        <!-- Filter Bar - emerald mint accents -->
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow p-5 border border-stone-200">
          <div class="flex flex-wrap items-end gap-4">
            <div class="flex-1 min-w-[140px]">
              <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">From Date</label>
              <input type="date" id="filter-start" class="w-full border border-stone-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-300">
            </div>
            <div class="flex-1 min-w-[140px]">
              <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">To Date</label>
              <input type="date" id="filter-end" class="w-full border border-stone-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-300">
            </div>
            <div class="flex-1 min-w-[140px]">
              <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">Category</label>
              <select id="filter-category" class="w-full border border-stone-300 rounded-xl px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-emerald-300">
                <option value="all">All Categories</option>
                <option value="Food">Food</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div>
              <button id="apply-filters" class="bg-emerald-400 hover:bg-emerald-500 text-stone-800 px-5 py-2 rounded-xl text-sm shadow flex items-center gap-2 transition" style="background-color:#34D399">
                <i class="fas fa-filter"></i> Apply
              </button>
            </div>
            <div>
              <button id="clear-filters" class="border border-stone-300 hover:bg-stone-100 px-5 py-2 rounded-xl text-sm flex items-center gap-2 transition text-stone-700">
                <i class="fas fa-undo-alt"></i> Reset
              </button>
            </div>
          </div>
        </div>

        <!-- Expenses List -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-stone-200">
          <div class="px-5 py-3 border-b bg-stone-50 flex justify-between items-center">
            <h2 class="font-semibold text-stone-800"><i class="fas fa-list-ul mr-2" style="color:#7E22CE"></i>All Expenses</h2>
            <span id="expense-count" class="text-xs bg-stone-200 text-stone-700 px-2 py-1 rounded-full">0 items</span>
          </div>
          <div id="expenses-container" class="p-4">
            <div class="text-center text-stone-400 py-8">No expenses added. Create your first expense!</div>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN: Summary with orange accent -->
      <div class="space-y-6">
        <div class="bg-gradient-to-br from-purple-50 to-white rounded-2xl shadow-md p-5 border border-purple-100" style="background: linear-gradient(135deg, #FAF5FF 0%, #FFFFFF 100%);">
          <h2 class="text-xl font-semibold text-stone-800 flex items-center gap-2">
            <i class="fas fa-chart-pie" style="color:#F97316"></i> Summary
          </h2>
          <div class="mt-3 text-center">
            <p class="text-stone-500 text-sm">Total Spent</p>
            <p id="total-amount" class="text-3xl md:text-4xl font-extrabold" style="color:#7E22CE">$0.00</p>
          </div>
          <div class="mt-5">
            <canvas id="expense-chart" width="400" height="300" style="max-height: 240px; width:100%"></canvas>
          </div>
          <div id="chart-empty-msg" class="text-center text-xs text-stone-400 hidden mt-2">No data to display chart</div>
        </div>
        <div class="bg-white rounded-2xl shadow p-4 text-sm text-stone-500 border border-stone-200">
          <i class="fas fa-info-circle mr-1" style="color:#F97316"></i> Data is saved locally. Edit / delete any expense.
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---------- GLOBAL STATE ----------
    let expenses = [];
    let filteredExpenses = [];
    let editingId = null;
    let chartInstance = null;

    // DOM elements
    const titleInput = document.getElementById('title');
    const amountInput = document.getElementById('amount');
    const categorySelect = document.getElementById('category');
    const dateInput = document.getElementById('date');
    const notesInput = document.getElementById('notes');
    const submitBtn = document.getElementById('submit-expense-btn');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');
    const formTitleSpan = document.getElementById('form-title');
    const expensesContainer = document.getElementById('expenses-container');
    const totalSpan = document.getElementById('total-amount');
    const expenseCountSpan = document.getElementById('expense-count');
    const filterStart = document.getElementById('filter-start');
    const filterEnd = document.getElementById('filter-end');
    const filterCategory = document.getElementById('filter-category');
    const applyFiltersBtn = document.getElementById('apply-filters');
    const clearFiltersBtn = document.getElementById('clear-filters');
    const titleError = document.getElementById('title-error');
    const amountError = document.getElementById('amount-error');
    const dateError = document.getElementById('date-error');

    function saveToLocalStorage() {
      localStorage.setItem('expense_tracker_data', JSON.stringify(expenses));
    }

    function loadFromLocalStorage() {
      const stored = localStorage.getItem('expense_tracker_data');
      if (stored) {
        expenses = JSON.parse(stored);
      } else {
        expenses = [
          { id: Date.now()+1, title: "Dinner with friends", amount: 45.50, category: "Food", date: "2025-06-01", notes: "Italian restaurant" },
          { id: Date.now()+2, title: "Electricity Bill", amount: 89.99, category: "Utilities", date: "2025-06-05", notes: "June payment" },
          { id: Date.now()+3, title: "Movie tickets", amount: 24.00, category: "Entertainment", date: "2025-06-03", notes: "Oppenheimer" }
        ];
        saveToLocalStorage();
      }
    }

    function applyFiltersAndRender() {
      let filtered = [...expenses];
      const startDate = filterStart.value;
      const endDate = filterEnd.value;
      const catFilter = filterCategory.value;

      if (startDate) filtered = filtered.filter(exp => exp.date >= startDate);
      if (endDate) filtered = filtered.filter(exp => exp.date <= endDate);
      if (catFilter !== 'all') filtered = filtered.filter(exp => exp.category === catFilter);
      filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
      filteredExpenses = filtered;
      renderExpenseList();
      updateSummaryAndChart();
    }

    function renderExpenseList() {
      if (!filteredExpenses.length) {
        expensesContainer.innerHTML = `<div class="text-center text-stone-400 py-8 bg-stone-50 rounded-xl"><i class="fas fa-receipt"></i> No expenses match the current view.</div>`;
        expenseCountSpan.innerText = `0 items`;
        return;
      }
      expenseCountSpan.innerText = `${filteredExpenses.length} ${filteredExpenses.length === 1 ? 'item' : 'items'}`;
      const isMobile = window.innerWidth < 768;
      if (!isMobile) {
        let tableHtml = `<div class="overflow-x-auto"><table class="min-w-full text-sm"><thead class="bg-stone-100 text-stone-600"><tr><th class="px-4 py-2 text-left">Title</th><th class="px-4 py-2 text-left">Amount</th><th class="px-4 py-2 text-left">Category</th><th class="px-4 py-2 text-left">Date</th><th class="px-4 py-2 text-center">Actions</th></tr></thead><tbody>`;
        filteredExpenses.forEach(exp => {
          tableHtml += `<tr class="border-b hover:bg-stone-50 transition">
            <td class="px-4 py-3 font-medium text-stone-800">${escapeHtml(exp.title)} ${exp.notes ? `<span class="text-xs text-stone-400 ml-1"><i class="fas fa-paperclip"></i></span>` : ''}</td>
            <td class="px-4 py-3 font-semibold" style="color:#7E22CE">$${exp.amount.toFixed(2)}</td>
            <td class="px-4 py-3"><span class="bg-stone-100 px-2 py-1 rounded-full text-xs text-stone-700">${exp.category}</span></td>
            <td class="px-4 py-3 text-stone-500">${exp.date}</td>
            <td class="px-4 py-3 text-center space-x-2">
              <button class="edit-expense-btn text-orange-500 hover:text-orange-600 transition" data-id="${exp.id}"><i class="fas fa-edit"></i></button>
              <button class="delete-expense-btn text-red-600 hover:text-red-700 transition ml-2" data-id="${exp.id}"><i class="fas fa-trash-alt"></i></button>
            </td>
          </tr>`;
        });
        tableHtml += `</tbody></table></div>`;
        expensesContainer.innerHTML = tableHtml;
      } else {
        let cardsHtml = `<div class="grid grid-cols-1 gap-3">`;
        filteredExpenses.forEach(exp => {
          cardsHtml += `
            <div class="bg-white border border-stone-200 rounded-xl p-4 shadow-sm flex justify-between items-start">
              <div class="flex-1">
                <div class="flex items-center gap-2 flex-wrap"><span class="font-bold text-stone-800">${escapeHtml(exp.title)}</span><span class="text-xs bg-stone-100 text-stone-600 px-2 py-0.5 rounded-full">${exp.category}</span></div>
                <div class="font-semibold mt-1" style="color:#7E22CE">$${exp.amount.toFixed(2)}</div>
                <div class="text-xs text-stone-400 flex items-center gap-2 mt-1"><i class="far fa-calendar-alt"></i> ${exp.date} ${exp.notes ? `<span class="italic">📝 ${escapeHtml(exp.notes)}</span>` : ''}</div>
              </div>
              <div class="flex flex-col gap-2">
                <button class="edit-expense-btn text-orange-500 text-lg" data-id="${exp.id}"><i class="fas fa-edit"></i></button>
                <button class="delete-expense-btn text-red-600 text-lg" data-id="${exp.id}"><i class="fas fa-trash"></i></button>
              </div>
            </div>`;
        });
        cardsHtml += `</div>`;
        expensesContainer.innerHTML = cardsHtml;
      }
      document.querySelectorAll('.edit-expense-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.getAttribute('data-id'));
          startEditExpense(id);
        });
      });
      document.querySelectorAll('.delete-expense-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.getAttribute('data-id'));
          if (confirm('Delete this expense permanently?')) deleteExpenseById(id);
        });
      });
    }

    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      });
    }

    function updateSummaryAndChart() {
      const total = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);
      totalSpan.innerText = `$${total.toFixed(2)}`;
      const categoryMap = new Map();
      filteredExpenses.forEach(exp => categoryMap.set(exp.category, (categoryMap.get(exp.category) || 0) + exp.amount));
      const labels = Array.from(categoryMap.keys());
      const dataValues = Array.from(categoryMap.values());
      const ctx = document.getElementById('expense-chart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      if (labels.length === 0) {
        document.getElementById('chart-empty-msg').classList.remove('hidden');
        chartInstance = new Chart(ctx, {
          type: 'pie',
          data: { labels: ['No Data'], datasets: [{ data: [1], backgroundColor: ['#D6D3D1'] }] },
          options: { plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: () => 'No expenses' } } } }
        });
        return;
      }
      document.getElementById('chart-empty-msg').classList.add('hidden');
      chartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: dataValues,
            backgroundColor: ['#7E22CE', '#34D399', '#F97316', '#8B5CF6', '#10B981', '#F59E0B'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 11 }, color: '#292524' } },
            tooltip: { callbacks: { label: (ctx) => `${ctx.label}: $${ctx.raw.toFixed(2)}` } }
          }
        }
      });
    }

    function addExpense(expenseData) {
      const newId = Date.now();
      const newExpense = { ...expenseData, id: newId, amount: parseFloat(expenseData.amount) };
      expenses.push(newExpense);
      saveToLocalStorage();
      resetFormAndEditing();
      applyFiltersAndRender();
    }

    function updateExpense(id, updatedData) {
      const index = expenses.findIndex(exp => exp.id === id);
      if (index !== -1) {
        expenses[index] = { ...expenses[index], ...updatedData, amount: parseFloat(updatedData.amount) };
        saveToLocalStorage();
        resetFormAndEditing();
        applyFiltersAndRender();
      }
    }

    function deleteExpenseById(id) {
      expenses = expenses.filter(exp => exp.id !== id);
      saveToLocalStorage();
      if (editingId === id) resetFormAndEditing();
      applyFiltersAndRender();
    }

    function startEditExpense(id) {
      const expense = expenses.find(exp => exp.id === id);
      if (!expense) return;
      editingId = expense.id;
      titleInput.value = expense.title;
      amountInput.value = expense.amount;
      categorySelect.value = expense.category;
      dateInput.value = expense.date;
      notesInput.value = expense.notes || '';
      submitBtn.innerHTML = '<i class="fas fa-pen"></i> Update Expense';
      submitBtn.style.backgroundColor = '#F97316';
      formTitleSpan.innerText = 'Edit Expense';
      cancelEditBtn.classList.remove('hidden');
    }

    function resetFormAndEditing() {
      titleInput.value = '';
      amountInput.value = '';
      categorySelect.value = 'Food';
      dateInput.value = '';
      notesInput.value = '';
      editingId = null;
      submitBtn.innerHTML = '<i class="fas fa-save"></i> Add Expense';
      submitBtn.style.backgroundColor = '#7E22CE';
      formTitleSpan.innerText = 'Add New Expense';
      cancelEditBtn.classList.add('hidden');
      [titleError, amountError, dateError].forEach(err => err.classList.add('hidden'));
    }

    function validateForm() {
      let isValid = true;
      const titleVal = titleInput.value.trim();
      const amountVal = amountInput.value.trim();
      const dateVal = dateInput.value;
      if (!titleVal) {
        titleError.innerText = 'Title is required';
        titleError.classList.remove('hidden');
        isValid = false;
      } else titleError.classList.add('hidden');
      if (!amountVal || isNaN(parseFloat(amountVal)) || parseFloat(amountVal) <= 0) {
        amountError.innerText = 'Amount must be a positive number';
        amountError.classList.remove('hidden');
        isValid = false;
      } else amountError.classList.add('hidden');
      if (!dateVal) {
        dateError.innerText = 'Please select a date';
        dateError.classList.remove('hidden');
        isValid = false;
      } else {
        const today = new Date().toISOString().split('T')[0];
        if (dateVal > today) {
          dateError.innerText = 'Date cannot be in the future';
          dateError.classList.remove('hidden');
          isValid = false;
        } else dateError.classList.add('hidden');
      }
      return isValid;
    }

    function onSubmitExpense() {
      if (!validateForm()) {
        const submitBtnEl = document.getElementById('submit-expense-btn');
        submitBtnEl.classList.add('error-shake');
        setTimeout(() => submitBtnEl.classList.remove('error-shake'), 300);
        return;
      }
      const expensePayload = {
        title: titleInput.value.trim(),
        amount: parseFloat(amountInput.value),
        category: categorySelect.value,
        date: dateInput.value,
        notes: notesInput.value.trim()
      };
      if (editingId !== null) updateExpense(editingId, expensePayload);
      else addExpense(expensePayload);
    }

    function handleFilters() { applyFiltersAndRender(); }
    function clearFilters() {
      filterStart.value = '';
      filterEnd.value = '';
      filterCategory.value = 'all';
      applyFiltersAndRender();
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (filteredExpenses) renderExpenseList(); }, 150);
    });

    function init() {
      loadFromLocalStorage();
      resetFormAndEditing();
      applyFiltersAndRender();
      submitBtn.addEventListener('click', onSubmitExpense);
      cancelEditBtn.addEventListener('click', resetFormAndEditing);
      applyFiltersBtn.addEventListener('click', handleFilters);
      clearFiltersBtn.addEventListener('click', clearFilters);
    }
    init();
  </script>
</body>
</html>
